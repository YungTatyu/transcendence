openapi: 3.0.0
info:
  title: Users API
  version: 1.0.0
  description: ft_transcendence内のユーザー管理API

servers:
  - url: https://user.42.fr

components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

security:
  - BearerAuth: []

paths:
  /users/:
    post:
      summary: ユーザーの新規作成(認証APIが叩く想定)
      operationId: createUser
      requestBody:
        description: 新規作成するユーザーのデータ
        required: true
        content:
          application/json:
            example:
              "name": "NEW"
      responses:
        '201':
          description: ユーザーの作成に成功
        '400':
          description: ユーザーの作成に失敗
    get:
      summary: ユーザーを "UserName" または "UserID" で検索
      operationId: findUser
      parameters:
        - name: user_id
          in: query
          description: SELECT * FROM Users WHERE Users.user_id = user_id;
          required: false
          schema:
            type: integer
        - name: user_name
          in: query
          description: SELECT * FROM Users WHERE Users.name = user_name;
          required: false
          schema:
            type: string
      responses:
        '200':
          description: Found User
          content:
            application/json:
              example:
                "user_id": 1
                "name": "ABC"
                "created_at": "2011-02-02"
        '404':
          description: Not Found User
  /users/me/:
    patch:
      summary: ユーザー情報の更新
      operationId: updateUserInfo
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                user_name:
                  type: string
                  format: string
                  description: 新しいユーザー名
                avatar_image:
                  type: string
                  format: string
                  description: Base64エンコード済みのプロフィール画像
              required:
                - current_password
      responses:
        '200':
          description: ユーザー情報を更新
          content:
            application/json:
              example:
                "user_id": 1
                "user_name": "NEW"
                "avatar_image": "Base64 Encode Binary Data"
        '400':
          description: 情報がおかしい
        '409':
          description: 既にユーザー名が使用されている
  /users/avatar/{user_id}/:
    get:
      summary: 特定のユーザーのプロフィール画像の取得
      operationId: getAvatar
      parameters:
        - name: user_id
          in: path
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: User avatar found
          content:
            application/json:
              example:
                "user_id": 1
                "avatar_image": "Base64 Encode Binary Data"
        '404':
          description: Not Found User avatar
