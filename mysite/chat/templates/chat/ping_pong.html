<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ping Pong Game</title>
  <style>
    body {
      margin: 0;
      overflow: hidden;
      font-family: Arial, sans-serif;
      color: white;
    }
    canvas {
      display: block;
      background: black;
    }
    #score {
      position: absolute;
      top: 20px;
      left: 50%;
      transform: translateX(-50%);
      font-size: 24px;
      z-index: 10;
    }
  </style>
</head>
<body>
  <div id="score">0 - 0</div> <!-- スコア表示部分 -->
  <canvas id="pong"></canvas>
  <script>

    function waitForSocketConnection(socket, callback) {
      const interval = setInterval(() => {
        if (socket.readyState === WebSocket.OPEN) {
          clearInterval(interval);
          callback();
        }
      }, 100); // 100msごとに確認
    }

    function sendMessageSafely(socket, message) {
      if (socket.readyState === WebSocket.OPEN) {
        socket.send(message);
      } else {
        waitForSocketConnection(socket, () => {
          socket.send(message);
        });
      }
    }

    let paddleUpdateInterval = null;
    function startPaddleUpdate() {
      if (!paddleUpdateInterval) {
        paddleUpdateInterval = setInterval(() => {
          sendMessageSafely(chatSocket, JSON.stringify({ 
            type: 'paddle_update', 
            paddle1: paddle1.y, 
            paddle2: paddle2.y 
          }));
        }, 10); // 50msごとに送信
      }
    }

    const roomName = "ping_pong";
    const chatSocket = new WebSocket(
      'ws://localhost:8000/ws/chat/' + roomName + '/'
    );

    let Player = 1

    chatSocket.onmessage = function(event) {
        const message = JSON.parse(event.data);
        if (message.type === 'score') {
          console.log("Received score update:", message);
          score1 = message.score1;
          score2 = message.score2;
          document.getElementById("score").textContent = `${score1} - ${score2}`;
        } else if (message.type === 'paddle_update') {
          console.log(message)
        }
    };

    chatSocket.onclose = function(e) {
        console.error('Chat socket closed unexpectedly');
    };

    const canvas = document.getElementById("pong");
    const ctx = canvas.getContext("2d");

    canvas.width = 800;
    canvas.height = 400;

    const paddleWidth = 10;
    const paddleHeight = 100;

    // Paddle and ball properties
    const paddle1 = { x: 0, y: canvas.height / 2 - paddleHeight / 2, dy: 0 };
    const paddle2 = { x: canvas.width - paddleWidth, y: canvas.height / 2 - paddleHeight / 2 };
    const ball = { x: canvas.width / 2, y: canvas.height / 2, dx: 4, dy: 4, size: 10 };

    // Scores
    let score1 = 0;
    let score2 = 0;

    // Key handlers
    const keys = {};
    window.addEventListener("keydown", (e) => { keys[e.key] = true; });
    window.addEventListener("keyup", (e) => { keys[e.key] = false; });

    function drawRect(x, y, width, height, color = "white") {
      ctx.fillStyle = color;
      ctx.fillRect(x, y, width, height);
    }

    function drawCircle(x, y, size, color = "white") {
      ctx.fillStyle = color;
      ctx.beginPath();
      ctx.arc(x, y, size, 0, Math.PI * 2);
      ctx.fill();
    }

    function drawText(text, x, y, color = "white", size = "20px") {
      ctx.fillStyle = color;
      ctx.font = `${size} Arial`;
      ctx.fillText(text, x, y);
    }

    function movePaddles() {
      if (keys["w"] && paddle1.y > 0) {
        paddle1.y -= 6; // Player 1 up
      }
      if (keys["s"] && paddle1.y < canvas.height - paddleHeight) {
        paddle1.y += 6; // Player 1 down
      }
      if (keys["o"] && paddle2.y > 0) {
        paddle2.y -= 6; // Player 1 up
      }
      if (keys["l"] && paddle2.y < canvas.height - paddleHeight) {
        paddle2.y += 6; // Player 1 down
      }
    }

    function moveBall() {
      ball.x += ball.dx;
      ball.y += ball.dy;

      // Ball collision with top and bottom walls
      if (ball.y <= 0 || ball.y >= canvas.height - ball.size) {
        ball.dy *= -1;
      }

      // Ball collision with paddles
      if (
        ball.x <= paddle1.x + paddleWidth &&
        ball.y >= paddle1.y &&
        ball.y <= paddle1.y + paddleHeight
      ) {
        ball.dx *= -1;
      }

      if (
        ball.x >= paddle2.x - ball.size &&
        ball.y >= paddle2.y &&
        ball.y <= paddle2.y + paddleHeight
      ) {
        ball.dx *= -1;
      }

      // Ball reset and scoring
      if (ball.x < 0) {
        score2++; // Player 2 scores
        resetBall();
        chatSocket.send(JSON.stringify({ type: 'score', score1: score1, score2: score2 }));
      }
      if (ball.x > canvas.width) {
        score1++; // Player 1 scores
        resetBall();
        chatSocket.send(JSON.stringify({ type: 'score', score1: score1, score2: score2 }));
      }
    }

    function resetBall() {
      ball.x = canvas.width / 2;
      ball.y = canvas.height / 2;
      ball.dx *= -1; // Reverse direction after reset
    }

    function draw() {
      ctx.clearRect(0, 0, canvas.width, canvas.height);

      // Draw paddles, ball, and scores
      drawRect(paddle1.x, paddle1.y, paddleWidth, paddleHeight);
      drawRect(paddle2.x, paddle2.y, paddleWidth, paddleHeight);
      drawCircle(ball.x, ball.y, ball.size);
      drawText(score1, canvas.width / 4, 50); // Player 1 score
      drawText(score2, (canvas.width / 4) * 3, 50); // Player 2 score
    }

    function update() {
      movePaddles();
      moveBall();
    }

    function gameLoop() {
      update();
      draw();
      requestAnimationFrame(gameLoop);
    }

    startPaddleUpdate()
    gameLoop();
  </script>
</body>
</html>
